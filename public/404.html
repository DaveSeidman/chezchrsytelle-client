<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function redirectToSpa() {
        var redirect = window.location.pathname + window.location.search + window.location.hash;
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var basePath = '/';

        if (window.location.hostname.endsWith('github.io') && pathParts.length > 0) {
          basePath = '/' + pathParts[0] + '/';
        }

        window.sessionStorage.setItem('gh-pages-redirect', redirect);
        window.location.replace(window.location.origin + basePath);
      })();
    </script>
  </head>
  <body></body>
</html>
