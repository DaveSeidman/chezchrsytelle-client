<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chez Chrystelle</title>
    <script>
      (function restoreRedirect() {
        var redirect = window.sessionStorage.getItem('gh-pages-redirect');
        if (!redirect) return;
        window.sessionStorage.removeItem('gh-pages-redirect');
        window.history.replaceState(null, '', redirect);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
